<!DOCTYPE html>
<html>
  <head>
    <title>PDX Tree Me</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
    <style>
      body {
          padding: 0;
          margin: 0;
      }
      html, body, #map {
          height: 100%;
          width: 100vw;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script>
    var map = L.map('map').fitWorld();
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    map.locate({setView: true});
    map.on('locationfound', (e) => {
      L.circle([e.latitude, e.longitude], {
        weight: 1,
        opacity: 0.5,
        color: '#f6cd75'
      },
      {
        radius: e.accuracy,
      }).addTo(map);
      console.log(e);
      var bounds = [
        [e.latitude - 0.0003, e.longitude - 0.0003],
        [e.latitude + 0.0003, e.longitude + 0.0003]
      ];
      var geometry = `${bounds[0][1]},${bounds[0][0]},${bounds[1][1]},${bounds[1][0]}`;
      var api = `https://www.portlandmaps.com/od/rest/services/COP_OpenData_Environment/MapServer/1415/query?where=1%3D1&outFields=SPECIES&geometry=${geometry}&geometryType=esriGeometryEnvelope&inSR=4326&spatialRel=esriSpatialRelContains&outSR=4326&f=json`

      fetch(api, {
        method: 'GET',
      })
      .then(function(response) {
        return response.json();
      })
      .then(function(json) {
        json.features.forEach((f, d) => {
          L.circleMarker([f.geometry.y, f.geometry.x]).addTo(map).bindPopup(f.attributes.SPECIES);
        });
      });
      map.fitBounds(bounds);
    });
    </script>
  </body>
</html>
